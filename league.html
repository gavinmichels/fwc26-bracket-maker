<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>League Standings — WC2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .league-row,
    .league-table-header {
      grid-template-columns: 36px 12px 1fr 110px !important;
    }
    .league-score {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      justify-content: flex-end;
      gap: 18px;
    }
    .league-stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1;
    }
    .league-stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      line-height: 1;
    }
    .league-stat-label {
      font-size: 0.55rem;
      font-weight: 700;
      opacity: 0.38;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 3px;
    }
  </style>
</head>
<body class="league-page">

  <div class="form-bg"></div>

  <header class="form-header">
    <a href="index.html" class="back-link">← Home</a>
    <span class="form-header-title">League Standings</span>
  </header>

  <main class="league-main">
    <div class="league-container" id="leagueRoot">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading standings…</p>
      </div>
    </div>
  </main>

  <script src="data/matches.js"></script>
  <script src="data/knockout_matches.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { FIREBASE_CONFIG } from "./js/firebase-config.js";

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    const root = document.getElementById("leagueRoot");

    async function loadLeague() {
      try {
        const [bracketsSnap, adminSnap, statsSnap, bonusSnap, koSnap] = await Promise.all([
          getDocs(collection(db, "brackets")),
          getDoc(doc(db, "admin", "outcomes")),
          getDoc(doc(db, "admin", "stats")),
          getDoc(doc(db, "admin", "bonuses")),
          getDoc(doc(db, "admin", "knockout")),
        ]);

        const outcomes = adminSnap.exists() ? adminSnap.data().results || {} : {};
        const playedCount = Object.keys(outcomes).length;
        const stats = statsSnap.exists() ? statsSnap.data() : { goals: null, yellows: null, reds: null };
        const bonuses = bonusSnap.exists() ? bonusSnap.data() : {};
        const koOutcomes = koSnap.exists() ? (koSnap.data().outcomes || {}) : {};

        const brackets = [];
        bracketsSnap.forEach(d => {
          const data = d.data();
          let correct = 0, points = 0;
          GROUP_STAGE_MATCHES.forEach(m => {
            const outcome = outcomes[m.id];
            const pick = data.picks ? data.picks[m.id] : undefined;
            if (outcome && pick === outcome) correct++;
            points += getMatchPoints(m, pick, outcome);
          });
          // Knockout points
          const { total: koPts } = getKnockoutPoints(data.koPicks || {}, koOutcomes);
          points += koPts;
          // Tiebreaker bonuses
          const bonusTags = [];
          for (const [key, bval] of Object.entries(bonuses)) {
            const emoji = key === "goals" ? "⚽" : key === "yellows" ? "🟨" : "🟥";
            const isWinner = (bval.bracketId1 === d.id || bval.bracketId2 === d.id);
            if (isWinner && bval.pts > 0) {
              points += bval.pts;
              bonusTags.push({ emoji, pts: bval.pts });
            }
          }
          const played = GROUP_STAGE_MATCHES.filter(m => outcomes[m.id]).length;
          const accuracy = played > 0 ? Math.round((correct / played) * 100) : 0;
          brackets.push({ id: d.id, ...data, correct, points, accuracy, bonusTags });
        });

        brackets.sort((a, b) => b.points - a.points);
        render(brackets, playedCount, outcomes, stats);
      } catch(e) {
        root.innerHTML = `<p class="error-msg" style="display:block; text-align:center;">Could not load standings.</p>`;
      }
    }

    function render(brackets, playedCount, outcomes, stats) {
      if (brackets.length === 0) {
        root.innerHTML = `
          <div class="league-empty">
            <div class="league-empty-icon">🏆</div>
            <h2>No brackets yet</h2>
            <p>Be the first to create a bracket!</p>
            <a href="create.html" class="btn btn-primary">Create Bracket →</a>
          </div>
        `;
        return;
      }

      const activeBracketId = sessionStorage.getItem("activeBracketId");

      const rows = brackets.map((b, i) => {
        const isMe = b.id === activeBracketId;
        const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i + 1}`;
        return `
          <div class="league-row ${isMe ? "league-row--me" : ""}" 
               onclick="openBracket('${b.id}')"
               style="${isMe ? `border-left: 3px solid ${b.color || "#1A5276"};` : ""}">
            <div class="league-rank">${medal}</div>
            <div class="league-color-dot" style="background:${b.color || "#1A5276"};"></div>
            <div class="league-info">
              <span class="league-name">${b.bracketName}</span>
              <span class="league-owner">${b.owner}${b.bonusTags && b.bonusTags.length ? ' &nbsp;' + b.bonusTags.map(t => `<span style="font-size:0.65rem;font-weight:700;color:var(--gold);background:rgba(240,192,64,0.12);border-radius:4px;padding:1px 5px;margin-left:3px;">${t.emoji}+${t.pts}</span>`).join('') : ''}</span>
            </div>
            <div class="league-score">
              <div class="league-stat">
                <span class="league-stat-value">${b.points}</span>
                <span class="league-stat-label">PTS</span>
              </div>
              <div class="league-stat">
                <span class="league-stat-value">${b.accuracy}%</span>
                <span class="league-stat-label">ACCURACY</span>
              </div>
            </div>
          </div>
        `;
      }).join("");

      const played = GROUP_STAGE_MATCHES.filter(m => outcomes[m.id]).length;

      root.innerHTML = `
        <div class="league-hero">
          <h1 class="league-title">🏆 Family League 🏆</h1>
          <p class="league-subtitle">${played} of 72 group stage matches played</p>
          <p class="league-subtitle" style="margin-top:4px; font-size:0.85rem; opacity:0.75;">
            ⚽ <strong>${stats.goals ?? "—"}</strong> goals &nbsp;·&nbsp;
            🟨 <strong>${stats.yellows ?? "—"}</strong> yellows &nbsp;·&nbsp;
            🟥 <strong>${stats.reds ?? "—"}</strong> reds
          </p>
        </div>

        <div class="league-table">
          <div class="league-table-header">
            <span>#</span>
            <span></span>
            <span>Bracket</span>
            <span style="text-align:right;">PTS &nbsp; ACCURACY</span>
          </div>
          ${rows}
        </div>

        <p class="league-note">Tap any bracket to view their picks.</p>
        <div class="league-actions">
          <a href="create.html" class="btn btn-primary">+ New Bracket</a>
          <a href="load.html" class="btn btn-secondary">Load Mine</a>
        </div>
      `;
    }

    window.openBracket = function(id) {
      sessionStorage.setItem("activeBracketId", id);
      sessionStorage.setItem("bracketIsOwner", "false");
      window.location.href = "bracket.html";
    };

    loadLeague();
  </script>
</body>
</html>
